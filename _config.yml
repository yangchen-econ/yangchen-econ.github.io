# Basic Site Settings
locale: "en-US"
site_theme: "default"
title: "Yang CHEN"
name: "Yang CHEN"
title_separator: "-"
description: "Academic website of Yang CHEN, PhD student in Economics at HEC Lausanne, University of Lausanne."
url: "https://yangchen-econ.github.io"
baseurl: ""
repository: "yangchen-econ/yangchen-econ.github.io"

# Site Author
author:
  avatar: "YC_PhotoCV.jpeg"
  name: "Yang CHEN"
  pronouns:
  bio: "PhD student in Economics at HEC Lausanne, University of Lausanne."
  location:
  employer: "HEC Lausanne, University of Lausanne"
  email: "yang.chen@unil.ch"
  orcid: "https://orcid.org/0009-0007-1342-7555"

  # Academic websites
  academia:
  arxiv:
  googlescholar:
  impactstory:
  semantic:
  pubmed:
  researchgate:
  scopus:

  # Repositories and software development
  bitbucket:
  codepen:
  dribbble:
  github:
  kaggle:
  stackoverflow:

  # Social media
  bluesky:
  facebook:
  flickr:
  foursquare:
  goodreads:
  google_plus:
  keybase:
  instagram:
  lastfm:
  linkedin:
  mastodon:
  medium:
  pinterest:
  soundcloud:
  steam:
  telegram:
  tumblr:
  twitter:
  vine:
  weibo:
  wikipedia:
  xing:
  youtube:
  zhihu:

# Publication Category
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# Site Settings
teaser:
breadcrumbs: false
words_per_minute: 160
future: false
read_more: "disabled"
talkmap_link: false

comments:
  provider:
  disqus:
    shortname:
  discourse:
    server:
  facebook:
    appid:
    num_posts:
    colorscheme:

staticman:
  allowedFields: ['name', 'email', 'url', 'message']
  branch: "gh-pages"
  commitMessage: "New comment."
  filename: comment-{@timestamp}
  format: "yml"
  moderation: true
  path: "_data/comments/{options.slug}"
  requiredFields: ['name', 'email', 'message']
  transforms:
    email: "md5"
  generatedFields:
    date:
      type: "date"
      options:
        format: "iso8601"

atom_feed:
  hide: true
  path:

# SEO Related
google_site_verification: google07e510d963141bb1.html
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

# Social Sharing
twitter:
  username: &twitter
facebook:
  username:
  app_id:
  publisher:
og_image:

social:
  type: Person
  name: "Yang CHEN"
  links:
    - https://orcid.org/0009-0007-1342-7555

# Analytics
analytics:
  provider: false
  google:
    tracking_id:

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - markdown_generator
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
  - wordpress

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /teaching/:path/
  publications:
    output: true
    permalink: /publications/:path/
  conferences:
    output: true
    permalink: /conferences/:path/
  courses:
    output: true
    permalink: /courses/:path/
  research:
    output: true
    permalink: /research/:path/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  # _conferences
  - scope:
      path: ""
      type: conferences
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  # _courses
  - scope:
      path: ""
      type: courses
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  # _research
  - scope:
      path: ""
      type: research
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
